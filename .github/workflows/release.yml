name: release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v[0-9]+.*'

jobs:
  test:
    uses: ./.github/workflows/_test.yml
    with:
      build: false

  create-release:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: extract version
        shell: bash
        run: |
          VERSION_TAG="${{ github.ref_name }}"
          VERSION="${VERSION_TAG#v}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "Version: ${VERSION}"
          if ! grep -q "version = \"$VERSION\"" Cargo.toml; then
            exit 1
          fi
      - name: create release
        run: |
          if gh release view "v${VERSION}" --json id; then
            echo "release already exists"
          else
            gh release create "v${VERSION}" --draft --verify-tag --title "$VERSION"
          fi
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'

  upload-binaries:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup
        with:
          target: "${{ matrix.target }}"
      - uses: taiki-e/upload-rust-binary-action@10c1cf6a3da113ad4e60018e386570529aa5f1d3 # v1.30.0
        with:
          bin: bluetooth-getty
          target: '${{ matrix.target }}'
          tar: unix
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-debs:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup
        with:
          target: "${{ matrix.target }}"
      - run: cargo install cargo-deb --locked
      - run: cargo deb --target=${{ matrix.target }}
      - run: gh release upload "${{ github.ref_name }}" target/${{ matrix.target }}/debian/*.deb
        shell: bash
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'

  publish-crate:
    # Publish to crates.io at very last step, as other upload-* can fail, but reverting a crate publish can be complicated.
    needs: [create-release, upload-binaries, upload-debs]
    runs-on: ubuntu-latest
    environment:
      name: crates-io
      url: https://crates.io/crates/bluetooth-getty
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth
      - run: cargo publish --no-verify
        env:
          CARGO_REGISTRY_TOKEN: "${{ steps.auth.outputs.token }}"
