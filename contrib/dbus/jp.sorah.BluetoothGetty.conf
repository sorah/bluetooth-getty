<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-Bus Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Name ownership: only the daemon (running as root) can claim the
       well-known name. -->
  <policy user="root">
    <allow own="jp.sorah.BluetoothGetty"/>
    <allow send_destination="jp.sorah.BluetoothGetty"/>
  </policy>

  <!-- bluetoothd runs as root on all mainstream distros, so the root
       policy above already grants it send access to Profile1. The
       default-context policy below is narrowed to Introspectable only,
       which lets busctl introspection work for unprivileged users
       without letting them call NewConnection. If your distro runs
       bluetoothd under a non-root user, add a parallel policy block
       for that user mirroring the root one above. -->
  <policy context="default">
    <allow send_destination="jp.sorah.BluetoothGetty"
           send_interface="org.freedesktop.DBus.Introspectable"/>
  </policy>
</busconfig>
